        exit();
    }
}

    ? "UPDATE cgt_accounts SET lname = ?, fname = ?, mname = ?, avatar = ? WHERE id = ?"
    : "UPDATE cgt_accounts SET lname = ?, fname = ?, mname = ? WHERE id = ?";

$stmt = $conn->prepare($sql);
if ($avatar_path) {
    // Bind 5 parameters when avatar is included
    $stmt->bind_param("ssssi", $lname, $fname, $mname, $avatar_path, $user_id);
} else {
    // Bind 4 parameters when avatar is not included
    $stmt->bind_param("sssi", $lname, $fname, $mname, $user_id);
}
if ($stmt->execute()) {
    echo json_encode(['success' => true]);
} else {
    echo json_encode(['success' => false, 'error' => $stmt->error]);
